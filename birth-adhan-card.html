<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birth Adhan Card — AdhanLive</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cyan: #00e5ff; --cyan-dim: rgba(0,229,255,0.12); --cyan-glow: rgba(0,229,255,0.35);
    --gold: #c9a84c; --gold-dim: rgba(201,168,76,0.15); --gold-bright: #e8c96a;
    --bg: #030a0e; --surface: rgba(255,255,255,0.03); --surface2: rgba(255,255,255,0.06);
    --border: rgba(0,229,255,0.12); --text: #e8f4f8;
    --text-dim: rgba(232,244,248,0.5); --text-muted: rgba(232,244,248,0.25);
  }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }
  .starfield {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 8% 15%, rgba(0,229,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 8%, rgba(0,229,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 63% 38%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 72%, rgba(0,229,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 18% 82%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 92%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 12%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 48%, rgba(0,229,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 65%, rgba(201,168,76,0.4) 0%, transparent 100%);
    background-size: 500px 500px; animation: drift 90s linear infinite;
  }
  @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-500px); } }
  .glow-top {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(0,229,255,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .page { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 32px 20px 48px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 40px; animation: fadeDown 0.5s ease both;
  }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  .brand { display: flex; align-items: center; gap: 10px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
  .brand span { color: var(--cyan); }
  .brand-icon { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: var(--surface2); }
  .form-section { animation: fadeUp 0.6s 0.1s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .section-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--cyan); margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
  .field input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 13px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; width: 100%;
  }
  .field input:focus { border-color: rgba(0,229,255,0.4); box-shadow: 0 0 0 3px rgba(0,229,255,0.06); }
  .generate-btn {
    width: 100%; margin-top: 20px; padding: 14px; border-radius: 10px;
    border: 1px solid var(--cyan); background: var(--cyan-dim); color: var(--cyan);
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease;
  }
  .generate-btn:hover { background: var(--cyan); color: var(--bg); box-shadow: 0 0 24px var(--cyan-glow); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .divider { display: none; align-items: center; gap: 16px; margin: 36px 0 28px; opacity: 0.4; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); }
  .divider span { font-size: 18px; }
  .card-wrapper { display: none; animation: fadeUp 0.5s ease both; }
  .card-wrapper.visible { display: block; }

  /* ── THE CARD ── */
  #adhanCard {
    width: 100%; background: #040d12; border-radius: 20px;
    border: 1px solid rgba(0,229,255,0.2); position: relative; overflow: hidden;
    padding: 36px 32px 28px;
    box-shadow: 0 0 60px rgba(0,229,255,0.08), 0 0 120px rgba(0,0,0,0.8);
  }
  .card-stars {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 5% 10%, rgba(0,229,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 15%, rgba(0,229,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 75%, rgba(0,229,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 90%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 10%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 12% 45%, rgba(255,255,255,0.3) 0%, transparent 100%);
    background-size: 350px 350px;
  }
  .card-frame-tl, .card-frame-tr, .card-frame-bl, .card-frame-br { position: absolute; width: 36px; height: 36px; }
  .card-frame-tl { top:16px; left:16px; border-top:1px solid rgba(0,229,255,0.35); border-left:1px solid rgba(0,229,255,0.35); }
  .card-frame-tr { top:16px; right:16px; border-top:1px solid rgba(0,229,255,0.35); border-right:1px solid rgba(0,229,255,0.35); }
  .card-frame-bl { bottom:16px; left:16px; border-bottom:1px solid rgba(0,229,255,0.35); border-left:1px solid rgba(0,229,255,0.35); }
  .card-frame-br { bottom:16px; right:16px; border-bottom:1px solid rgba(0,229,255,0.35); border-right:1px solid rgba(0,229,255,0.35); }
  .card-content { position: relative; z-index: 2; }

  /* Name + birth prayer stacked */
  .card-top { display: flex; flex-direction: column; gap: 16px; margin-bottom: 22px; }
  .card-eyebrow { font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--cyan); margin-bottom: 8px; opacity: 0.8; }
  .card-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(26px, 5vw, 40px); font-weight: 300; color: var(--text); line-height: 1.1; margin-bottom: 8px; }
  .card-meta { font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; line-height: 2; }
  .card-meta strong { color: var(--text-dim); font-weight: 400; }

  .card-birth-prayer {
    padding: 14px 18px; border-radius: 12px; border: 1px solid; background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .card-bp-label { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
  .card-bp-city { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 3px; }
  .card-bp-right { text-align: right; }
  .card-bp-prayer { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.1em; }
  .card-bp-time { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; line-height: 1; color: var(--text); }
  .card-bp-ampm { font-size: 12px; opacity: 0.6; }

  .card-rule { height: 1px; margin: 0 0 18px; background: linear-gradient(90deg, transparent, rgba(0,229,255,0.2), transparent); }

  /* Snapshot */
  .snapshot-label {
    font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 12px; opacity: 0.8;
    display: flex; align-items: center; gap: 8px;
  }
  .snapshot-label::after { content:''; flex:1; height:1px; background: rgba(0,229,255,0.15); }

  .regions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 18px; }
  .region-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 11px; border-radius: 7px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); gap: 6px;
  }
  .region-name { font-size: 10px; color: var(--text-muted); letter-spacing: 0.03em; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .region-prayer { display: flex; align-items: center; gap: 5px; font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 0.06em; white-space: nowrap; }
  .prayer-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .region-time { font-size: 9px; color: var(--text-muted); white-space: nowrap; margin-left: 2px; }

  /* Verse */
  .card-verse-block { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 16px; }
  .card-arabic { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--gold-bright); margin-bottom: 8px; text-align: center; opacity: 0.85; }
  .card-verse { font-family: 'Cormorant Garamond', serif; font-size: 12px; font-style: italic; color: var(--text-dim); line-height: 1.7; margin-bottom: 4px; text-align: center; }
  .card-verse-ref { font-size: 9px; letter-spacing: 0.15em; color: var(--gold); text-transform: uppercase; opacity: 0.7; text-align: center; }
  .card-watermark { margin-top: 14px; font-size: 8px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); opacity: 0.4; text-align: center; }
  .card-watermark span { color: var(--cyan); opacity: 1; }

  .download-btn {
    width: 100%; margin-top: 14px; padding: 13px; border-radius: 10px;
    border: 1px solid var(--gold); background: var(--gold-dim); color: var(--gold-bright);
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease;
  }
  .download-btn:hover { background: var(--gold); color: var(--bg); box-shadow: 0 0 20px rgba(201,168,76,0.3); }
  .download-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(0,229,255,0.3); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
    .regions-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="starfield"></div>
<div class="glow-top"></div>
<div class="page">
  <header>
    <div class="brand"><div class="brand-icon">🕌</div><div><span>Adhan</span>Live</div></div>
    <div style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);">Birth Adhan Card</div>
  </header>

  <div class="form-section">
    <div class="section-label">✦ Enter Birth Details</div>
    <div class="form-grid">
      <div class="field"><label>Full Name</label><input type="text" id="inputName" placeholder="e.g. Ahmed Ibrahim" /></div>
      <div class="field"><label>Date of Birth</label><input type="date" id="inputDate" /></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>City of Birth</label><input type="text" id="inputCity" placeholder="e.g. Istanbul" /></div>
      <div class="field"><label>Time of Birth (local)</label><input type="time" id="inputTime" /></div>
    </div>
    <div class="form-grid full">
      <div class="field"><label>Country</label><input type="text" id="inputCountry" placeholder="e.g. Turkey" /></div>
    </div>
    <button class="generate-btn" id="generateBtn" onclick="generateCard()">✦ &nbsp; Generate My Birth Adhan Card</button>
  </div>

  <div class="divider" id="divider"><span>🌙</span></div>

  <div class="card-wrapper" id="cardWrapper">
    <div id="adhanCard">
      <div class="card-stars"></div>
      <div class="card-frame-tl"></div><div class="card-frame-tr"></div>
      <div class="card-frame-bl"></div><div class="card-frame-br"></div>
      <div class="card-content">
        <div class="card-top">
          <div>
            <div class="card-eyebrow">Birth Adhan · AdhanLive</div>
            <div class="card-name" id="cardName">—</div>
            <div class="card-meta" id="cardMeta">—</div>
          </div>
          <div class="card-birth-prayer" id="cardBirthPrayer">
            <div>
              <div class="card-bp-label">Prayer at birth</div>
              <div class="card-bp-city" id="cardBpCity">—</div>
            </div>
            <div class="card-bp-right">
              <div class="card-bp-prayer" id="cardBpPrayer">—</div>
              <div class="card-bp-time"><span id="cardBpTime">—</span><span class="card-bp-ampm" id="cardBpAmpm"></span></div>
            </div>
          </div>
        </div>

        <div class="card-rule"></div>

        <div class="snapshot-label">🌍 &nbsp; Around the world at your birth moment</div>
        <div class="regions-grid" id="regionsGrid"></div>

        <div class="card-verse-block">
          <div class="card-arabic" id="cardArabic">—</div>
          <div class="card-verse" id="cardVerse">—</div>
          <div class="card-verse-ref" id="cardVerseRef">—</div>
        </div>
        <div class="card-watermark"><span>Adhan</span>Live · adhanlive.com</div>
      </div>
    </div>
    <button class="download-btn" id="downloadBtn" onclick="downloadCard()">↓ &nbsp; Download Card as Image</button>
  </div>
</div>

<script>
const PRAYER_COLORS = { Fajr:'#4466ff', Dhuhr:'#ffcc00', Asr:'#e07a2f', Maghrib:'#d94f3d', Isha:'#9b59c4' };
const PRAYER_DATA = {
  Fajr:    { arabic:'الصَّلَاةُ خَيْرٌ مِنَ النَّوْمِ', verse:'Establish prayer at the decline of the sun until the darkness of the night, and the Quran at dawn — indeed, the recitation of dawn is ever witnessed.', ref:'Quran 17:78' },
  Dhuhr:   { arabic:'أَقِمِ الصَّلَاةَ لِدُلُوكِ الشَّمْسِ', verse:'Indeed, prayer has been decreed upon the believers a decree of specified times.', ref:'Quran 4:103' },
  Asr:     { arabic:'حَافِظُوا عَلَى الصَّلَوَاتِ', verse:'By time, indeed, mankind is in loss — except for those who believe and do righteous deeds.', ref:'Quran 103:1-3' },
  Maghrib: { arabic:'فَسُبْحَانَ اللَّهِ حِينَ تُمْسُونَ', verse:'So exalt Allah when you reach evening and when you reach morning. And to Him is due all praise throughout the heavens and the earth.', ref:'Quran 30:17-18' },
  Isha:    { arabic:'وَمِنَ اللَّيْلِ فَاسْجُدْ لَهُ', verse:'They arise from their beds; they supplicate their Lord in fear and aspiration, and from what We have provided them, they spend.', ref:'Quran 32:16' },
};

const REGIONS = [
  { name:'West Africa',     city:'Dakar',     lat:14.72,  lon:-17.47 },
  { name:'East Africa',     city:'Nairobi',   lat:-1.29,  lon:36.82  },
  { name:'North Africa',    city:'Cairo',     lat:30.06,  lon:31.25  },
  { name:'Arabia',          city:'Makkah',    lat:21.39,  lon:39.86  },
  { name:'Turkey & Levant', city:'Istanbul',  lat:41.01,  lon:28.97  },
  { name:'Central Asia',    city:'Tashkent',  lat:41.30,  lon:69.24  },
  { name:'South Asia',      city:'Karachi',   lat:24.86,  lon:67.01  },
  { name:'Southeast Asia',  city:'Jakarta',   lat:-6.21,  lon:106.85 },
  { name:'Europe',          city:'London',    lat:51.51,  lon:-0.13  },
  { name:'North America',   city:'New York',  lat:40.71,  lon:-74.01 },
];

function julianDate(date) {
  const y=date.getUTCFullYear(), m=date.getUTCMonth()+1, d=date.getUTCDate();
  const A=Math.floor((14-m)/12), Y=y+4800-A, M=m+12*A-3;
  return d+Math.floor((153*M+2)/5)+365*Y+Math.floor(Y/4)-Math.floor(Y/100)+Math.floor(Y/400)-32045;
}

function getPrayerTimesUTC(date, lat, lon) {
  const D = julianDate(date) - 2451545.0;
  const g = (357.529+0.98560028*D)*Math.PI/180;
  const q = (280.459+0.98564736*D)%360;
  const L = (q+1.915*Math.sin(g)+0.020*Math.sin(2*g))*Math.PI/180;
  const e = (23.439-0.00000036*D)*Math.PI/180;
  const RA = Math.atan2(Math.cos(e)*Math.sin(L),Math.cos(L))*12/Math.PI;
  const sinDec = Math.sin(e)*Math.sin(L);
  const dec = Math.asin(sinDec);
  const EqT = q/15-((RA+24)%24);
  const transit = 12 - EqT - lon/15; // solar noon in UTC

  function ha(angle) {
    const latR=lat*Math.PI/180;
    const cosH=(Math.sin(angle*Math.PI/180)-Math.sin(latR)*sinDec)/(Math.cos(latR)*Math.cos(dec));
    if(Math.abs(cosH)>1) return null;
    return Math.acos(cosH)*180/Math.PI/15;
  }

  const asrAngle = Math.atan(-1/(1+Math.tan(Math.abs(lat*Math.PI/180-dec))))*180/Math.PI;

  return {
    Fajr:    ha(-18)!=null    ? transit-ha(-18)    : null,
    Sunrise: ha(-0.833)!=null ? transit-ha(-0.833) : null,
    Dhuhr:   transit+0.033,
    Asr:     ha(asrAngle)!=null ? transit+ha(asrAngle) : null,
    Maghrib: ha(-0.833)!=null ? transit+ha(-0.833) : null,
    Isha:    ha(-17)!=null    ? transit+ha(-17)    : null,
  };
}

function norm(h) { return ((h%24)+24)%24; }

function getActivePrayer(times, utcH) {
  const u = norm(utcH);
  const order = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  let active = 'Isha';
  for (const p of order) {
    if (times[p]!=null && u >= norm(times[p])) active = p;
  }
  // Deep night before Fajr
  if (times.Fajr!=null && u < norm(times.Fajr)) active = 'Isha';
  return active;
}

function decToTime(dec) {
  if(dec==null) return null;
  const h=norm(dec), hh=Math.floor(h), mm=Math.round((h-hh)*60);
  return { h:hh, m:mm===60?59:mm };
}

function fmt(t) {
  if(!t) return null;
  return { display:`${t.h%12||12}:${String(t.m).padStart(2,'0')}`, ampm:t.h<12?'AM':'PM' };
}

function fmtDate(s) {
  return new Date(s+'T12:00:00Z').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric',timeZone:'UTC'});
}

async function geocode(city, country) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city+', '+country)}&format=json&limit=1`);
    const d = await res.json();
    if(d.length) return { lat:parseFloat(d[0].lat), lon:parseFloat(d[0].lon) };
  } catch(e) {}
  return null;
}

async function generateCard() {
  const name    = document.getElementById('inputName').value.trim();
  const dateStr = document.getElementById('inputDate').value;
  const city    = document.getElementById('inputCity').value.trim();
  const timeStr = document.getElementById('inputTime').value;
  const country = document.getElementById('inputCountry').value.trim();
  if(!name||!dateStr||!city||!timeStr){ alert('Please fill in Name, Date, City, and Time.'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Calculating...';

  let bLat=21.39, bLon=39.86;
  const geo = await geocode(city, country);
  if(geo){ bLat=geo.lat; bLon=geo.lon; }

  const date = new Date(dateStr+'T12:00:00Z');
  const [bh,bm] = timeStr.split(':').map(Number);

  // Convert local birth time to UTC using longitude offset
  const localDec = bh + bm/60;
  const utcDec = norm(localDec - bLon/15);

  // Birth city prayers
  const bTimes = getPrayerTimesUTC(date, bLat, bLon);
  const bPrayer = getActivePrayer(bTimes, utcDec);
  // Convert prayer time from UTC to local using longitude offset
  const bPrayerLocalDec = bTimes[bPrayer] != null ? norm(bTimes[bPrayer] + bLon/15) : null;
  const bPrayerFmt = fmt(decToTime(bPrayerLocalDec));
  const pData = PRAYER_DATA[bPrayer];
  const pColor = PRAYER_COLORS[bPrayer];

  // Card header
  document.getElementById('cardName').textContent = name;
  document.getElementById('cardMeta').innerHTML =
    `<strong>${fmtDate(dateStr)}</strong><br>${city}${country?', '+country:''}<br>Born at ${String(bh).padStart(2,'0')}:${String(bm).padStart(2,'0')} local time`;

  const bpEl = document.getElementById('cardBirthPrayer');
  bpEl.style.borderColor = pColor+'55'; bpEl.style.background = pColor+'10';
  document.getElementById('cardBpPrayer').textContent = bPrayer;
  document.getElementById('cardBpPrayer').style.color = pColor;
  if(bPrayerFmt){
    document.getElementById('cardBpTime').textContent = bPrayerFmt.display;
    document.getElementById('cardBpAmpm').textContent = ' '+bPrayerFmt.ampm;
  }
  document.getElementById('cardBpCity').textContent = city;

  // World regions — same UTC moment
  const grid = document.getElementById('regionsGrid');
  grid.innerHTML = '';
  for(const r of REGIONS){
    const rTimes = getPrayerTimesUTC(date, r.lat, r.lon);
    const rPrayer = getActivePrayer(rTimes, utcDec);
    const rColor = PRAYER_COLORS[rPrayer];
    const rLocalDec = norm(utcDec + r.lon/15);
    const rFmt = fmt(decToTime(rLocalDec));

    const row = document.createElement('div');
    row.className = 'region-row';
    row.innerHTML = `
      <div class="region-name">${r.name}</div>
      <div class="region-prayer" style="color:${rColor}">
        <div class="prayer-dot" style="background:${rColor}"></div>${rPrayer}
      </div>
      <div class="region-time">${rFmt?rFmt.display+' '+rFmt.ampm:'—'}</div>`;
    grid.appendChild(row);
  }

  document.getElementById('cardArabic').textContent = pData.arabic;
  document.getElementById('cardVerse').textContent = pData.verse;
  document.getElementById('cardVerseRef').textContent = pData.ref;

  document.getElementById('divider').style.display='flex';
  const w = document.getElementById('cardWrapper');
  w.classList.add('visible');
  w.scrollIntoView({behavior:'smooth',block:'start'});

  btn.disabled=false; btn.innerHTML='✦ &nbsp; Regenerate Card';
}

async function downloadCard() {
  const btn = document.getElementById('downloadBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Preparing Image...';
  try {
    const canvas = await html2canvas(document.getElementById('adhanCard'),
      {scale:3,backgroundColor:'#040d12',useCORS:true,logging:false});
    const link = document.createElement('a');
    link.download = (document.getElementById('inputName').value.trim().replace(/\s+/g,'_')||'adhan')+'_BirthAdhan_AdhanLive.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e){ alert('Download failed. Please try again.'); }
  btn.disabled=false; btn.innerHTML='↓ &nbsp; Download Card as Image';
}
</script>
